services:
  haproxy:
    image: haproxy:2.9
    container_name: mockup-haproxy
    depends_on:
      - app1
      - app2
      - app3
    ports:
      - "80:80"
      - "443:443"
      - "8404:8404"
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - ./haproxy/certs:/usr/local/etc/haproxy/certs:ro
    networks:
      - backend

  app1:
    build:
      context: .
      dockerfile: Dockerfile
    image: mockup-api-server:local
    container_name: mockup-app1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment: &app_env
      PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/mockupdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_DRIVER: com.mysql.cj.jdbc.Driver
      SPRING_DATASOURCE_USERNAME: mockuser
      SPRING_DATASOURCE_PASSWORD: mockpass
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.MySQLDialect
      APP_OPEN_BROWSER_ON_START: "false"
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      INSTANCE_ID: app1
    networks:
      - backend

  app2:
    image: mockup-api-server:local
    pull_policy: never
    container_name: mockup-app2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *app_env
      INSTANCE_ID: app2
    networks:
      - backend

  app3:
    image: mockup-api-server:local
    pull_policy: never
    container_name: mockup-app3
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *app_env
      INSTANCE_ID: app3
    networks:
      - backend

  redis:
    image: redis:7-alpine
    container_name: mockup-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  db:
    image: mysql:8.4
    container_name: mockup-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: mockupdb
      MYSQL_USER: mockuser
      MYSQL_PASSWORD: mockpass
      MYSQL_ROOT_PASSWORD: rootpass
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - backend

volumes:
  mysql-data:
  redis-data:

networks:
  backend:
    driver: bridge
