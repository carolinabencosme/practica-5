# Application Name
spring.application.name=primera_practica

# Database connection (fully parameterized via environment variables)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://${DB_HOST:db}:${DB_PORT:3306}/${DB_NAME:mockupdb}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER:com.mysql.cj.jdbc.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USER:mockuser}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:mockpass}}

# H2 Console (enabled for optional local usage)
spring.h2.console.enabled=${SPRING_H2_CONSOLE_ENABLED:false}
spring.h2.console.path=${SPRING_H2_CONSOLE_PATH:/h2-console}

# JPA
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.MySQLDialect}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL:false}

# Thymeleaf
spring.thymeleaf.cache=${SPRING_THYMELEAF_CACHE:true}
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# JWT Configuration
jwt.secret=${JWT_SECRET:mockup_api_server_secret_key_2026_cambiar_en_produccion_por_seguridad}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Internationalization
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false

# Server
server.port=${PORT:8080}

# Logging
logging.level.org.example=${LOG_LEVEL_APP:INFO}
logging.level.org.springframework.security=${LOG_LEVEL_SECURITY:INFO}

# Mock users endpoint
mock.users.project-name=${MOCK_USERS_PROJECT_NAME:Usuarios}

# Browser auto-launch
app.open-browser-on-start=${APP_OPEN_BROWSER_ON_START:false}
